<!DOCTYPE html>
<html>

<head>
<title>AI Phishing URL Scanner</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
margin-top:120px;
}

.card{
background:#1e293b;
width:500px;
margin:auto;
padding:40px;
border-radius:15px;
box-shadow:0px 10px 30px rgba(0,0,0,0.6);
}

h1{
color:#38bdf8;
}

input{
width:80%;
padding:15px;
border:none;
border-radius:8px;
margin-top:20px;
font-size:16px;
}

button{
margin-top:20px;
padding:15px 30px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

/* loader container */

.loader{
display:none;
margin-top:30px;
}

/* search icon animation */

.search-icon{
font-size:60px;
animation:zoom 1s infinite;
}

/* zoom animation */

@keyframes zoom{

0%{
transform:scale(1);
}

50%{
transform:scale(1.4);
}

100%{
transform:scale(1);
}

}

</style>

<script>

function scanURL(event){

event.preventDefault()

document.getElementById("loader").style.display="block"

setTimeout(function(){

document.getElementById("scanForm").submit()

},1500)

}

</script>

</head>

<body>

<div class="card">

<h1>AI Phishing URL Scanner</h1>

<p>Detect phishing websites using Machine Learning</p>

<form id="scanForm" action="/scan" method="post" onsubmit="scanURL(event)">

<input type="text" name="url" placeholder="Enter website URL" required>

<br>

<button type="submit">Scan URL</button>

</form>

<div id="loader" class="loader">

<h3>Searching Website...</h3>

<div class="search-icon">🔍</div>

</div>

</div>

</body>
</html>
