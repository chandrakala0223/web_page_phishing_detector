<!DOCTYPE html>
<html>

<head>
<title>Website Safe</title>

<style>

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
font-family:Arial;
text-align:center;
margin-top:80px;
}

.card{
background:#065f46;
width:550px;
margin:auto;
padding:40px;
border-radius:15px;
box-shadow:0px 10px 30px rgba(0,0,0,0.6);
}

.safe{
font-size:90px;
animation:pop 1s ease infinite alternate;
}

h1{
color:#4ade80;
}

button{
margin-top:30px;
padding:12px 25px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

@keyframes pop{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

</style>

</head>

<body>

<div class="card">

<div class="safe">✅</div>

<h1>Website is Safe</h1>

<p><b>URL:</b> {{url}}</p>

<h3>Confidence: {{score}}</h3>

<p>This website appears legitimate.</p>

<a href="/">
<button>Scan Another URL</button>
</a>

</div>

</body>
</html>
